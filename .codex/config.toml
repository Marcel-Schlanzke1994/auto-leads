# Codex workspace configuration for auto-leads
# Ziel: sichere Defaults, reproduzierbarer Workflow, klare Qualitäts-Gates.

[model]
default = "gpt-5.3-codex"
reasoning = "balanced"

[model.review]
enabled = true
model = "gpt-5.3-codex"
strict = true

[model.autofix]
enabled = true
model = "gpt-5.3-codex"
max_attempts = 2

[sandbox]
filesystem = "workspace-write"
network = "restricted"

[approval]
strategy = "on-request"
# Sichere Freigabestrategie: erhöhte Zugriffe und kritische Aktionen nur bei Bedarf.

[agents]
directory = ".codex/agents"
auto_suggest = true
allow_parallel_readonly = true
forbid_parallel_writes_same_file = true
prefer_readonly_for = ["security", "review", "audit"]

[security]
forbid_secret_inlining = true
blocked_patterns = [
  "AKIA",
  "-----BEGIN PRIVATE KEY-----",
  "xoxb-",
  "ghp_"
]
secret_env_files = [".env", ".env.*"]
require_env_vars_over_hardcoded_paths = true

[quality]
required_on_code_changes = [
  "pytest",
  "black --check .",
  "flake8"
]
allow_docs_only_skip = true

[workflow]
default_branch = "main"
plan_file = ".agent/PLANS.md"
master_execplan = "docs/execplans/auto-lead-system-execplan.md"

[workflow.commands]
test = "pytest"
lint_black = "black --check ."
lint_flake8 = "flake8"
start_app = "python run.py"

[skills]
directory = ".agents/skills"
load_strategy = "on-demand"
prefer_project_skills = true
max_active_skills = 3
