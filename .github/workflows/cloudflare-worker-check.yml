name: Cloudflare Worker Check

on:
  pull_request:
    paths:
      - "cloudflare/**"
      - ".github/workflows/cloudflare-worker-check.yml"
  push:
    paths:
      - "cloudflare/**"
      - ".github/workflows/cloudflare-worker-check.yml"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cloudflare/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
