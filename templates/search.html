{% extends 'base.html' %}
{% block title %}Suche - Auto Leads{% endblock %}
{% block content %}
<section class="panel">
  <h2>Google Places Suche starten</h2>
  <form method="post" class="form-grid">
    {{ form.hidden_tag() }}
    <label>Suchbegriff {{ form.keyword(placeholder='z. B. Dachdecker') }}</label>
    <label>Städte (kommagetrennt) {{ form.cities(placeholder='Köln, Bonn, Leverkusen') }}</label>
    <label>Radius (optional Meter) {{ form.radius(placeholder='5000') }}</label>
    <div>{{ form.submit(class_='btn') }}</div>
  </form>
</section>
{% endblock %}
